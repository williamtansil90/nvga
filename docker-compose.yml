name: news-video-generator-alpha

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: news-video-generator-api-alpha
    labels:
      org.opencontainers.image.title: "News Video Generator [ALPHA] — API"
    ports:
      - "${API_PORT:-8001}:8001"
    environment:
      BG_VIDEO_DEFAULT: ${BG_VIDEO_DEFAULT:-/app/media/background-video.mp4}
      AUDIO_DEFAULT: ${AUDIO_DEFAULT:-/app/media/music.mp3}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: news-video-generator-ui-alpha
    labels:
      org.opencontainers.image.title: "News Video Generator [ALPHA] — UI"
    ports:
      - "${UI_PORT:-5001}:5001"
    environment:
      API_URL: http://api:8001
    volumes:
      - ui-outputs:/app/static/outputs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ui-outputs:
