services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: n2v-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      BG_VIDEO_DEFAULT: ${BG_VIDEO_DEFAULT:-/app/media/background-video.mp4}
      AUDIO_DEFAULT: ${AUDIO_DEFAULT:-/app/media/music.mp3}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: n2v-ui
    ports:
      - "${UI_PORT:-5000}:5000"
    environment:
      API_URL: http://api:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ui-outputs:/app/static/outputs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ui-outputs:
